<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ScamAware</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: #070e1a;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* --- Header --- */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid #1a3353;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: rgba(0, 201, 167, 0.1);
      border: 1px solid rgba(0, 201, 167, 0.3);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg { width: 18px; height: 18px; color: #00c9a7; }

    .logo-text { font-size: 16px; font-weight: 800; }
    .logo-text span { color: #00c9a7; }

    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .toggle-label { font-size: 12px; color: #94a3b8; }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #1a3353;
      border-radius: 999px;
      transition: background 0.2s;
    }

    .toggle input:checked ~ .toggle-track { background: #00c9a7; }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

    /* --- Current page status --- */
    .section {
      padding: 16px 18px;
      border-bottom: 1px solid #1a3353;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #2d4a6a;
      margin-bottom: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.safe      { background: #00c9a7; }
    .status-dot.suspicious { background: #fbbf24; }
    .status-dot.dangerous  { background: #f87171; }
    .status-dot.unknown    { background: #2d4a6a; }
    .status-dot.scanning   { background: #00c9a7; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .status-text { font-size: 13px; color: #94a3b8; line-height: 1.4; }
    .status-text strong { color: #fff; font-weight: 600; }

    /* --- Recent scans --- */
    .scan-list { display: flex; flex-direction: column; gap: 8px; }

    .scan-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: #060b15;
      border: 1px solid #1a3353;
      border-radius: 8px;
    }

    .scan-badge {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .scan-badge.safe       { background: rgba(0,201,167,0.15); color: #00c9a7; }
    .scan-badge.suspicious { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .scan-badge.dangerous  { background: rgba(248,113,113,0.15); color: #f87171; }

    .scan-url {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .empty-state {
      font-size: 12px;
      color: #2d4a6a;
      text-align: center;
      padding: 12px 0;
    }

    /* --- Settings --- */
    .settings-section { padding: 16px 18px; }

    .settings-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .settings-row:last-child { margin-bottom: 0; }

    .settings-row label {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.5px;
    }

    .settings-row input {
      background: #060b15;
      border: 1px solid #1a3353;
      border-radius: 8px;
      padding: 8px 10px;
      color: #fff;
      font-size: 12px;
      font-family: ui-monospace, Consolas, monospace;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .settings-row input:focus { border-color: #00c9a7; }

    .save-btn {
      width: 100%;
      padding: 9px;
      background: #00c9a7;
      color: #060b15;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .save-btn:hover { opacity: 0.85; }

    .save-confirm {
      font-size: 11px;
      color: #00c9a7;
      text-align: center;
      margin-top: 6px;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <div class="logo-text">Scam<span>Aware</span></div>
    </div>

    <div class="toggle-wrap">
      <span class="toggle-label" id="toggle-label">On</span>
      <label class="toggle">
        <input type="checkbox" id="enabled-toggle" checked />
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <!-- Current page status -->
  <div class="section">
    <div class="section-label">Current Page</div>
    <div class="status-row">
      <div class="status-dot unknown" id="status-dot"></div>
      <div class="status-text" id="status-text">Loading...</div>
    </div>
  </div>

  <!-- Recent scans -->
  <div class="section">
    <div class="section-label">Recent Scans</div>
    <div class="scan-list" id="scan-list">
      <div class="empty-state">No scans yet</div>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings-section">
    <div class="section-label">Settings</div>

    <div class="settings-row">
      <label for="api-url-input">API URL</label>
      <input type="text" id="api-url-input" placeholder="http://localhost:8000/api" />
    </div>

    <div class="settings-row">
      <label for="whitelist-input">Whitelisted Domains</label>
      <input type="text" id="whitelist-input" placeholder="google.com, github.com" />
    </div>

    <button class="save-btn" id="save-btn">Save Settings</button>
    <div class="save-confirm" id="save-confirm"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
