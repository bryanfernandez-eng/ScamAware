<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScamAware — Warning</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: #070e1a;
      background-image:
        linear-gradient(#00c9a7 1px, transparent 1px),
        linear-gradient(90deg, #00c9a7 1px, transparent 1px);
      background-size: 40px 40px;
      background-attachment: fixed;
      /* grid opacity via a pseudo element workaround — done with overlay div instead */
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #fff;
      padding: 24px;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(#00c9a7 1px, transparent 1px),
        linear-gradient(90deg, #00c9a7 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.03;
      pointer-events: none;
    }

    .card {
      position: relative;
      background: #0d1a2d;
      border: 1px solid #1a3353;
      border-radius: 24px;
      padding: 48px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
    }

    /* --- Logo --- */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: rgba(0, 201, 167, 0.1);
      border: 1px solid rgba(0, 201, 167, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 26px; height: 26px; color: #00c9a7; }

    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: #00c9a7; }

    /* --- Risk badge --- */
    .risk-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 2px solid;
      padding: 24px 32px;
      text-align: center;
      margin-bottom: 28px;
    }

    .risk-badge.dangerous {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.4);
    }
    .risk-badge.suspicious {
      background: rgba(245, 158, 11, 0.1);
      border-color: rgba(245, 158, 11, 0.4);
    }
    .risk-badge.safe {
      background: rgba(0, 201, 167, 0.1);
      border-color: rgba(0, 201, 167, 0.4);
    }

    .risk-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    .risk-value {
      font-size: 40px;
      font-weight: 900;
      letter-spacing: -1px;
      text-transform: capitalize;
    }

    .risk-badge.dangerous .risk-value { color: #f87171; }
    .risk-badge.suspicious .risk-value { color: #fbbf24; }
    .risk-badge.safe .risk-value { color: #00c9a7; }

    .risk-score {
      margin-top: 8px;
      font-size: 14px;
      opacity: 0.6;
    }

    /* --- URL block --- */
    .url-block {
      background: #060b15;
      border: 1px solid #1a3353;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 12px;
    }

    .url-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .url-value {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 13px;
      color: #94a3b8;
      word-break: break-all;
      line-height: 1.5;
    }

    /* --- Context note --- */
    .context-note {
      font-size: 13px;
      color: #2d4a6a;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* --- Buttons --- */
    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, background 0.15s;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .btn-back {
      background: #1a3353;
      color: #fff;
    }

    .btn-proceed {
      background: #00c9a7;
      color: #060b15;
    }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
        </svg>
      </div>
      <div class="logo-text">Scam<span>Aware</span></div>
    </div>

    <div class="risk-badge" id="risk-badge">
      <div class="risk-label">Risk Assessment</div>
      <div class="risk-value" id="risk-value">—</div>
      <div class="risk-score" id="risk-score"></div>
    </div>

    <div class="url-block">
      <div class="url-label">Scanned URL</div>
      <div class="url-value" id="scanned-url">—</div>
    </div>

    <p class="context-note" id="context-note"></p>

    <div class="actions">
      <button class="btn btn-back" id="btn-back">Go Back</button>
      <button class="btn btn-proceed" id="btn-proceed">Proceed Anyway</button>
    </div>
  </div>

  <script src="warning.js"></script>
</body>
</html>
